name: Sync from Upstream and Deploy

on:
  schedule:
    - cron: '0 * * * *'  # Run every hour
  workflow_dispatch:      # Allow manual trigger

env:
  UPSTREAM_REPO: https://github.com/SpiritbloomPro/new-spiritbloom.git
  UPSTREAM_BRANCH: dev

jobs:
  sync-check:
    name: Check for Upstream Updates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for upstream updates
        id: check
        run: |
          git remote add upstream ${{ env.UPSTREAM_REPO }}
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}
          UPSTREAM=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          echo "Upstream dev: $UPSTREAM"
          if git ls-remote --exit-code origin ${{ env.UPSTREAM_BRANCH }} >/dev/null 2>&1; then
            git fetch origin ${{ env.UPSTREAM_BRANCH }}
            LOCAL=$(git rev-parse origin/${{ env.UPSTREAM_BRANCH }})
            echo "origin/dev: $LOCAL"
            if [ "$LOCAL" = "$UPSTREAM" ]; then
              echo "No updates found, skipping deployment"
              echo "has_updates=false" >> $GITHUB_OUTPUT
            else
              echo "Updates found, will sync and deploy"
              echo "has_updates=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "origin/dev does not exist, will create it"
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Docusaurus
    needs: sync-check
    if: needs.sync-check.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with upstream dev
        run: |
          git remote add upstream ${{ env.UPSTREAM_REPO }}
          git fetch upstream ${{ env.UPSTREAM_BRANCH }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin ${{ env.UPSTREAM_BRANCH }} >/dev/null 2>&1; then
            git fetch origin ${{ env.UPSTREAM_BRANCH }}
            if git merge-base --is-ancestor origin/${{ env.UPSTREAM_BRANCH }} upstream/${{ env.UPSTREAM_BRANCH }}; then
              echo "Fast-forward is possible, updating origin/dev"
              git checkout -B ${{ env.UPSTREAM_BRANCH }} upstream/${{ env.UPSTREAM_BRANCH }}
              git push origin ${{ env.UPSTREAM_BRANCH }}
            else
              echo "ERROR: origin/dev is not an ancestor of upstream/dev. Manual intervention required."
              exit 1
            fi
          else
            echo "origin/dev does not exist, creating it from upstream/dev"
            git checkout -B ${{ env.UPSTREAM_BRANCH }} upstream/${{ env.UPSTREAM_BRANCH }}
            git push origin ${{ env.UPSTREAM_BRANCH }}
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
